<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sami's iPhone 18 Pro Weather</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="iphone-frame">
        <div class="notch"></div>
        <div class="screen">
            <div class="bg-overlay"></div>
            
            <header class="location-top">
                <p id="current-date">Tuesday, 21 April</p>
                <div class="dynamic-clock-box">
                    <h1 id="local-time">09:41</h1>
                    <div id="scenery" class="weather-icon">☀️</div>
                </div>
                <h2 id="city-name">Dhaka</h2>
            </header>

            <section class="temp-main">
                <h2 id="temp">28°</h2>
                <p id="description">Cloudy</p>
                <span id="temp-range">36°—26°</span>
            </section>

            <section class="info-grid">
                <div>WIND: <span id="wind">--</span></div>
                <div>FEELS: <span id="feels-like">--</span></div>
                <div>PRECIP: <span id="precip">--</span></div>
            </section>

            <footer class="footer">
                <div class="dev-tag">Md. Emtiaz Hossain Sami</div>
                <div class="home-line"></div>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
