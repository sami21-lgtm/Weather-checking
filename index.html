<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sami's iPhone 18 Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="iphone-frame">
        <div class="notch"></div>
        <div class="screen">
            <div class="bg-overlay"></div>
            
            <div class="search-box">
                <input type="text" id="city-input" placeholder="Search City...">
                <i class="fa-solid fa-magnifying-glass" id="search-btn"></i>
            </div>

            <header class="location-top">
                <p id="current-date">Tuesday, 21 April</p>
                <div class="clock-row">
                    <h1 id="local-time">09:41</h1>
                    <div id="scenery" class="weather-icon">☀️</div>
                </div>
                <h2 id="city-name">Dhaka</h2>
            </header>

            <section class="temp-main">
                <h2 id="temp">28°</h2>
                <p id="description">Partly Cloudy</p>
                <span id="temp-range">36°—26°</span>
            </section>

            <section class="info-bar">
                <div class="info-item">WIND: <span id="wind">10 km/h</span></div>
                <div class="info-item">FEELS: <span id="feels-like">28°</span></div>
                <div class="info-item">PRECIP: <span id="precip">5%</span></div>
            </section>

            <footer class="footer">
                <div class="dev-tag">Md. Emtiaz Hossain Sami</div>
                <div class="home-line"></div>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
